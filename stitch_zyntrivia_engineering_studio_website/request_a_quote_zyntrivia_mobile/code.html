<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Request a Quote — Zyntrivia</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist:wght@400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #121316;
            color: #e3e2e6;
            -webkit-font-smoothing: antialiased;
        }
        .pill-row-selected {
            background-color: #131417;
            border-color: #b4c5ff;
            color: #b4c5ff;
        }
        .pill-row {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Custom scrollbar suppression for a cleaner look */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary": "#581e00",
                      "tertiary-fixed": "#ffdbcd",
                      "tertiary-container": "#bc4800",
                      "secondary": "#c5c7c8",
                      "on-primary-container": "#eeefff",
                      "secondary-fixed": "#e1e3e4",
                      "on-tertiary-fixed-variant": "#7d2d00",
                      "on-error-container": "#ffdad6",
                      "surface-dim": "#121316",
                      "surface-bright": "#38393c",
                      "inverse-surface": "#e3e2e6",
                      "outline-variant": "#434655",
                      "secondary-container": "#47494a",
                      "on-secondary-container": "#b7b8ba",
                      "primary-container": "#2563eb",
                      "tertiary-fixed-dim": "#ffb596",
                      "primary-fixed": "#dbe1ff",
                      "outline": "#8d90a0",
                      "on-secondary-fixed": "#191c1d",
                      "on-surface-variant": "#c3c6d7",
                      "on-primary-fixed": "#00174b",
                      "inverse-primary": "#0053db",
                      "surface-tint": "#b4c5ff",
                      "on-primary": "#002a78",
                      "surface-container": "#1f1f23",
                      "on-tertiary-container": "#ffede6",
                      "on-secondary-fixed-variant": "#454748",
                      "primary-fixed-dim": "#b4c5ff",
                      "on-surface": "#e3e2e6",
                      "on-secondary": "#2e3132",
                      "background": "#121316",
                      "surface-variant": "#343538",
                      "surface-container-highest": "#343538",
                      "surface-container-lowest": "#0d0e11",
                      "on-tertiary-fixed": "#360f00",
                      "on-error": "#690005",
                      "secondary-fixed-dim": "#c5c7c8",
                      "tertiary": "#ffb596",
                      "surface": "#121316",
                      "surface-container-low": "#1b1b1f",
                      "primary": "#b4c5ff",
                      "inverse-on-surface": "#2f3034",
                      "surface-container-high": "#292a2d",
                      "error-container": "#93000a",
                      "on-primary-fixed-variant": "#003ea8",
                      "on-background": "#e3e2e6",
                      "error": "#ffb4ab"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "gutter": "32px",
                      "stack-sm": "8px",
                      "container-max": "1280px",
                      "stack-md": "24px",
                      "stack-lg": "64px",
                      "section-padding": "160px",
                      "margin-mobile": "24px"
              },
              "fontFamily": {
                      "headline-lg-mobile": ["Geist"],
                      "body-md": ["Inter"],
                      "display-xl": ["Geist"],
                      "label-sm": ["Geist"],
                      "headline-lg": ["Geist"]
              },
              "fontSize": {
                      "headline-lg-mobile": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "500"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0em", "fontWeight": "400"}],
                      "display-xl": ["72px", {"lineHeight": "1.1", "letterSpacing": "-0.03em", "fontWeight": "500"}],
                      "label-sm": ["12px", {"lineHeight": "1", "letterSpacing": "0.12em", "fontWeight": "600"}],
                      "headline-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "400"}]
              }
            },
          },
        }
      </script>
</head>
<body class="flex flex-col min-h-screen">
<!-- Top Navigation (Shell Rule: Suppressed Links, Fixed Anchor) -->
<header class="fixed top-0 w-full z-50 bg-background flex justify-between items-center px-6 py-6 border-b border-outline-variant/10">
<div class="font-headline-lg-mobile text-headline-lg-mobile font-regular text-on-surface">Zyntrivia</div>
<button class="p-2 text-on-surface-variant" onclick="window.history.back()">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<main class="flex-grow pt-24 pb-32 px-6 flex flex-col items-start max-w-container-max mx-auto w-full">
<!-- Progress Indicator -->
<div class="w-full flex items-center gap-2 mb-12">
<div class="h-1 flex-grow rounded-full bg-primary"></div>
<div class="h-1 flex-grow rounded-full bg-surface-variant"></div>
<div class="h-1 flex-grow rounded-full bg-surface-variant"></div>
<span class="font-label-sm text-label-sm text-primary ml-2">01/03</span>
</div>
<!-- Headline Section -->
<div class="mb-12">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-4">Request a quote</h1>
<p class="font-body-md text-body-md text-on-tertiary-fixed-variant max-w-xs">
                We utilize a transparent, fixed-price model for all engineering phases. Select your project scope to begin.
            </p>
</div>
<!-- Pill Rows (Selectable List) -->
<div class="w-full space-y-3 mb-16" id="service-selector">
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">Internal tool</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">AI workflow</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">SaaS architecture</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">Legacy migration</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">Cloud infrastructure</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">MVP development</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">Design system engineering</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
<button class="pill-row w-full flex items-center justify-between p-5 rounded-lg border border-outline-variant/30 bg-transparent text-left hover:border-primary/50" onclick="toggleSelection(this)">
<span class="font-body-md text-body-md">Security audit</span>
<span class="material-symbols-outlined text-outline-variant/50">add</span>
</button>
</div>
</main>
<!-- Bottom Action Bar (Contextual Suppression of Nav) -->
<footer class="fixed bottom-0 w-full bg-background/95 backdrop-blur-md px-6 py-8 border-t border-outline-variant/10">
<button class="w-full bg-primary-container text-on-primary-container py-5 rounded-lg font-label-sm text-label-sm uppercase tracking-[0.2em] opacity-50 cursor-not-allowed transition-all duration-300" disabled="" id="continue-btn">
            Continue
        </button>
</footer>
<script>
        let selectedCount = 0;
        
        function toggleSelection(element) {
            const icon = element.querySelector('.material-symbols-outlined');
            
            if (element.classList.contains('pill-row-selected')) {
                element.classList.remove('pill-row-selected');
                icon.innerText = 'add';
                selectedCount--;
            } else {
                element.classList.add('pill-row-selected');
                icon.innerText = 'check';
                selectedCount++;
            }
            
            updateButtonState();
        }

        function updateButtonState() {
            const btn = document.getElementById('continue-btn');
            if (selectedCount > 0) {
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.classList.add('opacity-100', 'cursor-pointer');
                btn.disabled = false;
            } else {
                btn.classList.add('opacity-50', 'cursor-not-allowed');
                btn.classList.remove('opacity-100', 'cursor-pointer');
                btn.disabled = true;
            }
        }
    </script>
</body></html>
